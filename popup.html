<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 260px;
      margin: 0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: #18181b;
      color: #efeff1;
    }
    .header {
      padding: 14px 16px;
      background: #9147ff;
      font-weight: 700;
      font-size: 14px;
    }
    .body { padding: 14px 16px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status { color: #00e701; font-weight: 600; }
    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 4px;
      background: #772ce8;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #9147ff; }
    .note { margin-top: 10px; font-size: 11px; color: #adadb8; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">Twitch Ad Blocker</div>
  <div class="body">
    <div class="row">
      <span>広告ブロック</span>
      <span class="status" id="status">有効 (全チャンネル)</span>
    </div>
    <div class="row">
      <span>動画広告 (SSAI)</span>
      <span class="status">差し替え ON</span>
    </div>
    <div class="row">
      <span>表示広告 / トラッキング</span>
      <span class="status">ブロック ON</span>
    </div>
    <button id="reload">Twitch を再読み込み</button>
    <div class="note">
      広告が表示される場合は再読み込みしてください。Twitch 側の仕様変更で一時的に
      効かなくなることがあります。
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
